name: Code Radar Scan
inputs:
  path:
    required: false
    default: "."
  policy-path:
    required: false
  fail-on:
    required: false
    default: high
  upload-sarif:
    required: false
    default: "true"
  comment-pr:
    required: false
    default: "true"
  since:
    required: false
  baseline:
    required: false
    default: "true"
  version:
    required: false
    default: "latest"
  license-key:
    required: false
    description: "Code Radar license key. Prefer passing secrets.RADAR_LICENSE_KEY."
  cosign-identity-regexp:
    required: false
    description: "Cosign certificate identity regex for Code Radar release artifacts."
outputs:
  status:
    description: "Merge readiness status: ready, review, or blocked"
    value: ${{ steps.summarize.outputs.status }}
  status-label:
    description: "Human-readable merge readiness status"
    value: ${{ steps.summarize.outputs.status-label }}
  risk-level:
    description: "Workflow risk level: low, medium, or high"
    value: ${{ steps.summarize.outputs.risk-level }}
  reason:
    description: "Short reason for the merge readiness status"
    value: ${{ steps.summarize.outputs.reason }}
  finding-count:
    description: "Number of active unsuppressed findings"
    value: ${{ steps.summarize.outputs.finding-count }}
  blocker-count:
    description: "Number of active high or critical findings"
    value: ${{ steps.summarize.outputs.blocker-count }}
  security-score:
    description: "Security health score from 0 to 100"
    value: ${{ steps.summarize.outputs.security-score }}
  slop-index:
    description: "Slop index from 0 to 100"
    value: ${{ steps.summarize.outputs.slop-index }}
  structure-score:
    description: "Structure health score from 0 to 100"
    value: ${{ steps.summarize.outputs.structure-score }}
  files-scanned:
    description: "Number of files scanned"
    value: ${{ steps.summarize.outputs.files-scanned }}
  report-json:
    description: "Path to the JSON report generated by the action"
    value: radar-report.json
runs:
  using: composite
  steps:
    - name: Install cosign
      uses: sigstore/cosign-installer@v3.7.0
    - name: Install radar
      shell: bash
      env:
        RADAR_INPUT_VERSION: ${{ inputs.version }}
        RADAR_COSIGN_IDENTITY_REGEXP: ${{ inputs.cosign-identity-regexp }}
      run: |
        if command -v radar >/dev/null 2>&1; then
          echo "radar already installed"
        else
          repo="${GITHUB_ACTION_REPOSITORY:-T-and-T-soft/code-radar}"
          version="$RADAR_INPUT_VERSION"
          signing_repo="${RADAR_RELEASE_SIGNING_REPO:-T-and-T-soft/code-radar-private}"
          public_signing_repo="${RADAR_PUBLIC_RELEASE_SIGNING_REPO:-T-and-T-soft/code-radar}"
          public_signing_workflow="${RADAR_PUBLIC_RELEASE_SIGNING_WORKFLOW:-sign-public-release.yml}"
          default_identity_regexp="https://github.com/(${signing_repo}/.github/workflows/release.yml|${public_signing_repo}/.github/workflows/${public_signing_workflow})@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+.*"
          identity_regexp="${RADAR_COSIGN_IDENTITY_REGEXP:-$default_identity_regexp}"
          verify_artifact() {
            artifact="$1"
            bundle="$2"
            RADAR_REQUIRE_SIGNATURE=1 COSIGN_IDENTITY_REGEXP="$identity_regexp" \
              "$GITHUB_ACTION_PATH/../scripts/verify-release-signature.sh" "$artifact" "$bundle"
          }
          if [[ "$version" == "latest" ]]; then
            if [[ "$(uname -s)" == "Linux" && "$(uname -m)" == "x86_64" ]]; then
              url="https://github.com/${repo}/releases/download/radar-action-runtime-latest/radar-linux-x86_64.tar.gz"
              artifact="$RUNNER_TEMP/radar-linux-x86_64.tar.gz"
              bundle="$artifact.cosign.bundle"
              mkdir -p "$HOME/.local/bin"
              curl --proto '=https' --tlsv1.2 -fsSL "$url" -o "$artifact"
              curl --proto '=https' --tlsv1.2 -fsSL "${url}.cosign.bundle" -o "$bundle"
              verify_artifact "$artifact" "$bundle"
              tar -xzf "$artifact" -C "$HOME/.local/bin"
              chmod +x "$HOME/.local/bin/radar"
            else
              url="https://github.com/${repo}/releases/latest/download/radar-cli-installer.sh"
              installer="$RUNNER_TEMP/radar-cli-installer.sh"
              bundle="$installer.cosign.bundle"
              curl --proto '=https' --tlsv1.2 -fsSL "$url" -o "$installer"
              curl --proto '=https' --tlsv1.2 -fsSL "${url}.cosign.bundle" -o "$bundle"
              verify_artifact "$installer" "$bundle"
              sh "$installer"
            fi
          else
            url="https://github.com/${repo}/releases/download/${version}/radar-cli-installer.sh"
            installer="$RUNNER_TEMP/radar-cli-installer.sh"
            bundle="$installer.cosign.bundle"
            curl --proto '=https' --tlsv1.2 -fsSL "$url" -o "$installer"
            curl --proto '=https' --tlsv1.2 -fsSL "${url}.cosign.bundle" -o "$bundle"
            verify_artifact "$installer" "$bundle"
            sh "$installer"
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        fi
    - name: Resolve diff ref
      shell: bash
      env:
        RADAR_INPUT_PATH: ${{ inputs.path }}
        RADAR_INPUT_SINCE: ${{ inputs.since }}
        RADAR_EVENT_NAME: ${{ github.event_name }}
        RADAR_BASE_REF: ${{ github.base_ref }}
      run: |
        : > radar-changed-files.txt
        RADAR_SINCE_VALUE=""
        if [[ -n "$RADAR_INPUT_SINCE" ]]; then
          RADAR_SINCE_VALUE="$RADAR_INPUT_SINCE"
        elif [[ "$RADAR_EVENT_NAME" == "pull_request" && -n "$RADAR_BASE_REF" ]]; then
          git fetch --no-tags --depth=1 origin "$RADAR_BASE_REF"
          RADAR_SINCE_VALUE="origin/${RADAR_BASE_REF}"
        fi
        echo "RADAR_SINCE=${RADAR_SINCE_VALUE}" >> "$GITHUB_ENV"
        if [[ -n "$RADAR_SINCE_VALUE" ]]; then
          git diff --name-only --diff-filter=ACMRT "$RADAR_SINCE_VALUE" -- "$RADAR_INPUT_PATH" > radar-changed-files.txt || true
        fi
    - name: Validate Code Radar license
      shell: bash
      env:
        RADAR_ACTION_LICENSE_KEY: ${{ inputs.license-key }}
        RADAR_INPUT_PATH: ${{ inputs.path }}
      run: |
        [[ -n "$RADAR_ACTION_LICENSE_KEY" ]] && export RADAR_LICENSE_KEY="$RADAR_ACTION_LICENSE_KEY"
        radar license refresh "$RADAR_INPUT_PATH"
    - name: Scan SARIF
      shell: bash
      env:
        RADAR_ACTION_LICENSE_KEY: ${{ inputs.license-key }}
        RADAR_INPUT_BASELINE: ${{ inputs.baseline }}
        RADAR_INPUT_FAIL_ON: ${{ inputs.fail-on }}
        RADAR_INPUT_PATH: ${{ inputs.path }}
        RADAR_INPUT_POLICY_PATH: ${{ inputs.policy-path }}
      run: |
        [[ -n "$RADAR_ACTION_LICENSE_KEY" ]] && export RADAR_LICENSE_KEY="$RADAR_ACTION_LICENSE_KEY"
        set +e
        ARGS=(scan "$RADAR_INPUT_PATH" --format sarif --fail-on "$RADAR_INPUT_FAIL_ON" --baseline "$RADAR_INPUT_BASELINE")
        [[ -n "$RADAR_INPUT_POLICY_PATH" ]] && ARGS+=(--policy "$RADAR_INPUT_POLICY_PATH")
        [[ -n "$RADAR_SINCE" ]] && ARGS+=(--since "$RADAR_SINCE")
        radar "${ARGS[@]}" > radar.sarif.json
        status=$?
        echo "RADAR_EXIT_CODE=$status" >> "$GITHUB_ENV"
        exit 0
    - name: Scan JSON
      shell: bash
      env:
        RADAR_ACTION_LICENSE_KEY: ${{ inputs.license-key }}
        RADAR_INPUT_BASELINE: ${{ inputs.baseline }}
        RADAR_INPUT_PATH: ${{ inputs.path }}
        RADAR_INPUT_POLICY_PATH: ${{ inputs.policy-path }}
      run: |
        [[ -n "$RADAR_ACTION_LICENSE_KEY" ]] && export RADAR_LICENSE_KEY="$RADAR_ACTION_LICENSE_KEY"
        ARGS=(scan "$RADAR_INPUT_PATH" --format json --quiet --baseline "$RADAR_INPUT_BASELINE")
        [[ -n "$RADAR_INPUT_POLICY_PATH" ]] && ARGS+=(--policy "$RADAR_INPUT_POLICY_PATH")
        [[ -n "$RADAR_SINCE" ]] && ARGS+=(--since "$RADAR_SINCE")
        radar "${ARGS[@]}" > radar-report.json
    - name: Summarize outputs
      id: summarize
      shell: bash
      run: |
        node <<'NODE'
        const fs = require('fs');
        const report = JSON.parse(fs.readFileSync('radar-report.json', 'utf8'));
        const scorecard = report.scorecard || {};
        const manifest = report.manifest || {};
        const inventory = manifest.inventory || {};
        const recommended = Array.isArray(report.recommended_findings) ? report.recommended_findings : [];
        const allFindings = Array.isArray(report.findings) ? report.findings : [];
        const findings = (recommended.length > 0 ? recommended : allFindings).filter((f) => !f.suppressed);

        function number(value, fallback) {
          return Number.isFinite(Number(value)) ? Number(value) : fallback;
        }

        const securityScore = number(scorecard.security_risk_score, 100);
        const structureScore = number(scorecard.code_health_score, 100);
        const slopIndex = number(scorecard.slop_index, 0);
        const blockerCount = findings.filter((f) => ['critical', 'high'].includes(String(f.severity).toLowerCase())).length;

        function readiness() {
          if (blockerCount > 0 || securityScore < 70 || structureScore < 50 || slopIndex >= 50) {
            return ['blocked', 'Blocked', 'high', 'fix high-risk security, slop, or structure issues before merge'];
          }
          if (findings.length || securityScore < 90 || structureScore < 80 || slopIndex >= 21) {
            return ['review', 'Review', 'medium', 'merge is possible, but the branch still carries quality risk'];
          }
          return ['ready', 'Ready', 'low', 'no blocking security, slop, or structure signals detected'];
        }

        function writeOutput(name, value) {
          const out = process.env.GITHUB_OUTPUT;
          const text = String(value ?? '').replace(/\r/g, '');
          if (text.includes('\n')) {
            const marker = `RADAR_${name.replace(/[^A-Za-z0-9_]/g, '_')}`;
            fs.appendFileSync(out, `${name}<<${marker}\n${text}\n${marker}\n`);
          } else {
            fs.appendFileSync(out, `${name}=${text}\n`);
          }
        }

        const [status, statusLabel, riskLevel, reason] = readiness();
        writeOutput('status', status);
        writeOutput('status-label', statusLabel);
        writeOutput('risk-level', riskLevel);
        writeOutput('reason', reason);
        writeOutput('finding-count', findings.length);
        writeOutput('blocker-count', blockerCount);
        writeOutput('security-score', securityScore);
        writeOutput('slop-index', slopIndex);
        writeOutput('structure-score', structureScore);
        writeOutput('files-scanned', inventory.files_selected ?? manifest.files_scanned ?? '');
        NODE
    - name: Generate HTML report
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        RADAR_ACTION_LICENSE_KEY: ${{ inputs.license-key }}
        RADAR_INPUT_BASELINE: ${{ inputs.baseline }}
        RADAR_INPUT_PATH: ${{ inputs.path }}
        RADAR_INPUT_POLICY_PATH: ${{ inputs.policy-path }}
      run: |
        [[ -n "$RADAR_ACTION_LICENSE_KEY" ]] && export RADAR_LICENSE_KEY="$RADAR_ACTION_LICENSE_KEY"
        HTML_ARGS=(scan "$RADAR_INPUT_PATH" --format html --quiet --baseline "$RADAR_INPUT_BASELINE")
        [[ -n "$RADAR_INPUT_POLICY_PATH" ]] && HTML_ARGS+=(--policy "$RADAR_INPUT_POLICY_PATH")
        [[ -n "$RADAR_SINCE" ]] && HTML_ARGS+=(--since "$RADAR_SINCE")
        radar "${HTML_ARGS[@]}" > radar.html
    - name: Upload HTML report
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: code-radar-html-report
        path: radar.html
    - name: Upload SARIF
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: radar.sarif.json
    - name: PR comment
      if: inputs.comment-pr == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- code-radar-report -->';
          const report = JSON.parse(fs.readFileSync('radar-report.json', 'utf8'));
          const scorecard = report.scorecard || {};
          const manifest = report.manifest || {};
          const inventory = manifest.inventory || {};
          const recommended = Array.isArray(report.recommended_findings) ? report.recommended_findings : [];
          const allFindings = Array.isArray(report.findings) ? report.findings : [];
          const findings = (recommended.length > 0 ? recommended : allFindings).filter((f) => !f.suppressed);
          const top = findings.slice(0, 5);
          const fingerprints = findings.map((f) => f.fingerprint).filter(Boolean);
          const changedFiles = fs.existsSync('radar-changed-files.txt')
            ? fs.readFileSync('radar-changed-files.txt', 'utf8').split(/\r?\n/).map((line) => line.trim()).filter(Boolean)
            : [];

          function status() {
            const high = findings.some((f) => ['critical', 'high', 'Critical', 'High'].includes(String(f.severity)));
            if (high || scorecard.security_risk_score < 70 || scorecard.code_health_score < 50 || scorecard.slop_index >= 50) {
              return ['Blocked', 'fix high-risk security, slop, or structure issues before merge'];
            }
            if (findings.length || scorecard.security_risk_score < 90 || scorecard.code_health_score < 80 || scorecard.slop_index >= 21) {
              return ['Review', 'merge is possible, but the branch still carries quality risk'];
            }
            return ['Ready', 'no blocking security, slop, or structure signals detected'];
          }

          const [state, reason] = status();
          const rows = [
            `| Security | ${scorecard.security_risk_score ?? 100} |`,
            `| Slop | ${scorecard.slop_index ?? 0} |`,
            `| Structure | ${scorecard.code_health_score ?? 100} |`,
          ].join('\n');
          const blockers = top.length
            ? top.map((f, i) => `${i + 1}. **${f.severity}** \`${f.rule_id}\` in \`${f.file_path}\`:${f.line_range?.[0] ?? 1} — ${f.message}`).join('\n')
            : 'No recommended findings.';
          const prompt = top.length
            ? ['```text', 'Fix these Code Radar blockers without unrelated refactors.', ...top.map((f, i) => `${i + 1}. ${f.severity} ${f.rule_id} in ${f.file_path}:${f.line_range?.[0] ?? 1} — ${f.recommendation?.summary || f.message}`), '```'].join('\n')
            : '';

          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;
          const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
          const previous = comments.data.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));
          let fixed = [];
          if (previous) {
            const match = previous.body.match(/<!-- code-radar-fingerprints:([^>]*)-->/);
            const prev = match ? match[1].split(',').filter(Boolean) : [];
            const current = new Set(fingerprints);
            fixed = prev.filter((fp) => !current.has(fp));
          }
          const fixedText = fixed.length
            ? fixed.map((fp) => `- \`${fp}\``).join('\n')
            : 'No previously tracked blockers cleared yet.';
          const changedFilesText = changedFiles.length
            ? changedFiles.slice(0, 30).map((file) => `- \`${file.replace(/`/g, '\\`')}\``).concat(changedFiles.length > 30 ? [`- ...and ${changedFiles.length - 30} more`] : []).join('\n')
            : (manifest.incremental_diff ? 'No changed files found for this diff scope.' : 'Workspace scan; changed-file inventory is not scoped to a diff.');
          const changed = inventory.files_selected ?? manifest.files_scanned ?? 'unknown';
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = [
            marker,
            `<!-- code-radar-fingerprints:${fingerprints.join(',')} -->`,
            `## Code Radar: ${state}`,
            '',
            reason,
            '',
            `**Scope:** ${manifest.incremental_diff ? 'diff scan' : 'workspace scan'} · **Files scanned:** ${changed} · [HTML report artifact](${runUrl})`,
            '',
            '| Signal | Score |',
            '|--------|-------|',
            rows,
            '',
            '<details open>',
            '<summary>Top blockers</summary>',
            '',
            blockers,
            '',
            '</details>',
            '',
            '<details>',
            '<summary>Fixed since previous Radar comment</summary>',
            '',
            fixedText,
            '',
            '</details>',
            '',
            '<details>',
            '<summary>Changed files</summary>',
            '',
            changedFilesText,
            '',
            '</details>',
            '',
            '<details>',
            '<summary>Repair brief</summary>',
            '',
            prompt,
            '',
            '</details>',
          ].join('\n');

          if (previous) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }
    - name: Fail on gate
      shell: bash
      run: exit "${RADAR_EXIT_CODE:-0}"
